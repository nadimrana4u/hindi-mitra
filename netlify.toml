[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[functions.analyze]
  timeout = 26

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
